spring.application.name=tpbatch

spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

spring.jpa.hibernate.ddl-auto=none
spring.sql.init.schema-locations=classpath:schema.sql

spring.datasource.url=jdbc:sqlite:./data/ban.db
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect

logging.level.com.example.tpbatch = ERROR
spring.batch.job.enabled=false

#logging.level.org.hibernate.orm.jdbc.bind=TRACE
#logging.level.org.hibernate.SQL=DEBUG
#logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE


urlCsv=https://adresse.data.gouv.fr/data/ban/adresses/latest/csv/adresses-79.csv.gz
file=./data/adresses-79-new.csv
tempFile=./data/addrTemp.csv

chunkSize=10000
